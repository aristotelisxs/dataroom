name: build-and-push image

# Rebuild the app image and push it to GHCR (the repo's linked package) on every push to main
# that touches image content. README/docs-only pushes are skipped. Also runnable on demand.
on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - server/**
      - pi/**
      - templates/**
      - web/**
      - assets/**
      - .github/workflows/build-and-push.yml
  workflow_dispatch:

concurrency:
  group: build-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write        # push to ghcr.io/<owner>/<repo> with the built-in GITHUB_TOKEN (no PAT)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The image is ~14GB; default runners only have ~14GB free. Reclaim ~25GB first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
          # org.opencontainers.image.source label links the package to this repo.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Dataroom-as-a-Service app: autonomous Pi + local-model research harness
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false          # keep a plain manifest so GHCR auto-links the package to the repo
          cache-from: type=gha
          cache-to: type=gha,mode=max
