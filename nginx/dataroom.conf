# Reverse proxy for dataroom.hanxiao.io -> daas app (:8000), fronted by Cloudflare.
# Listens on :80 and :443 (self-signed origin cert) so it works whether the Cloudflare
# zone SSL mode is Flexible (CF->origin :80) or Full (CF->origin :443, self-signed accepted).

# Basic abuse guard: rate-limit ONLY new-job submissions (POST /jobs), keyed by the real
# client IP from Cloudflare's header. An empty key (any other request, incl. the homepage's
# GET /jobs polling) is NOT accounted, so normal browsing is unthrottled.
map "$request_method$uri" $jobs_post_key {
    default "";
    "POST/jobs" $http_cf_connecting_ip;
}
limit_req_zone $jobs_post_key zone=jobspost:10m rate=10r/m;

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name dataroom.hanxiao.io _;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    client_max_body_size 5m;
    limit_req zone=jobspost burst=5 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://daas:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
